<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tool Lab Route View</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2WKE3N7YEH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2WKE3N7YEH');
  </script>
  <style>
    :root {
      --bg: #0b0b0c;
      --panel: #131316;
      --line: rgba(255,255,255,0.14);
      --text: #f2f2f4;
      --muted: rgba(242,242,244,0.66);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 380px at 110% -10%, rgba(255,255,255,0.1), rgba(255,255,255,0)),
        radial-gradient(900px 380px at -10% -30%, rgba(255,255,255,0.06), rgba(255,255,255,0)),
        var(--bg);
    }
    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 28px clamp(14px, 3vw, 34px) 44px;
      display: grid;
      gap: 14px;
    }
    .panel {
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      letter-spacing: -0.03em;
      font-weight: 650;
    }
    .sub { margin: 8px 0 0; color: var(--muted); font-size: 13px; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      background: #101013;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      padding: 11px;
      display: grid;
      gap: 8px;
    }
    .card h3 {
      margin: 0;
      font-size: 14px;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .score {
      font-size: 11px;
      color: #dbf2ff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      width: fit-content;
      background: rgba(135,196,255,0.15);
    }
    .link {
      font-size: 11px;
      color: #cfe7ff;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(135,196,255,0.12);
      width: fit-content;
    }
    .link:hover { color: #fff; border-color: rgba(255,255,255,0.42); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
      color: var(--muted);
    }
    th { color: var(--text); font-weight: 600; }
    .back {
      width: fit-content;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      background: rgba(255,255,255,0.04);
    }
    @media (max-width: 900px) {
      .row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 620px) {
      .row { grid-template-columns: 1fr; }
      .wrap { padding: 20px 12px 34px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <a class="back" href="./index.html">Back to Lab</a>
    <section class="panel">
      <h1 id="title">AI Tool Route</h1>
      <p id="subtitle" class="sub"></p>
      <div id="meta" class="meta"></div>
    </section>
    <section class="panel">
      <div id="cards" class="row"></div>
    </section>
    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>Tool</th>
            <th>Score</th>
            <th>Quality</th>
            <th>Speed</th>
            <th>Free</th>
            <th>Automation</th>
            <th>Reliability</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>
  </main>
  <script>
    const datasets = {
      text2image: [
        { tool: "Midjourney", url: "https://www.midjourney.com/", quality: 9.4, speed: 7.6, freeValue: 2.0, automation: 4.8, ease: 7.3, batch: 7.2, reliability: 8.8, note: "Best visual quality and style consistency." },
        { tool: "Leonardo", url: "https://leonardo.ai/", quality: 8.4, speed: 8.1, freeValue: 7.8, automation: 6.0, ease: 8.2, batch: 7.1, reliability: 8.2, note: "Strong free tier and creator workflow." },
        { tool: "DALL-E", url: "https://openai.com/dall-e/", quality: 8.2, speed: 8.9, freeValue: 6.2, automation: 7.1, ease: 8.7, batch: 6.3, reliability: 8.5, note: "Fast generation and good prompt following." },
        { tool: "Canva AI", url: "https://www.canva.com/ai-image-generator/", quality: 7.4, speed: 8.8, freeValue: 7.1, automation: 3.9, ease: 9.4, batch: 5.1, reliability: 8.1, note: "Easiest for quick social media assets." }
      ],
      bgremove: [
        { tool: "remove.bg", url: "https://www.remove.bg/", quality: 9.1, speed: 9.3, freeValue: 7.4, automation: 8.8, ease: 9.4, batch: 7.8, reliability: 9.2, note: "Most reliable for product and portrait cutouts." },
        { tool: "Cleanup.pictures", url: "https://cleanup.pictures/", quality: 8.2, speed: 8.1, freeValue: 8.1, automation: 4.0, ease: 8.6, batch: 5.6, reliability: 8.4, note: "Great for object cleanup and retouching." },
        { tool: "Photopea", url: "https://www.photopea.com/", quality: 7.2, speed: 6.3, freeValue: 9.2, automation: 2.1, ease: 6.4, batch: 4.2, reliability: 7.8, note: "Free-heavy but more manual operations." },
        { tool: "Canva AI", url: "https://www.canva.com/ai-image-generator/", quality: 7.8, speed: 8.4, freeValue: 7.0, automation: 3.8, ease: 8.9, batch: 6.3, reliability: 8.0, note: "Fast and easy for creator workflows." }
      ],
      watermark: [
        { tool: "Cleanup.pictures", url: "https://cleanup.pictures/", quality: 8.0, speed: 8.2, freeValue: 8.2, automation: 3.9, ease: 8.7, batch: 5.3, reliability: 8.3, note: "Solid visual cleanup quality for many cases." },
        { tool: "Photopea", url: "https://www.photopea.com/", quality: 7.9, speed: 6.1, freeValue: 9.0, automation: 2.0, ease: 6.0, batch: 4.0, reliability: 7.7, note: "Manual but controllable for harder edits." },
        { tool: "Canva AI", url: "https://www.canva.com/ai-image-generator/", quality: 6.8, speed: 8.7, freeValue: 7.1, automation: 3.4, ease: 9.1, batch: 5.0, reliability: 7.5, note: "Easy starter option for light edits." },
        { tool: "Inpaint", url: "https://theinpaint.com/", quality: 7.3, speed: 7.8, freeValue: 5.6, automation: 1.8, ease: 7.5, batch: 3.5, reliability: 7.4, note: "Focused simple inpainting experience." }
      ]
    };

    const categoryLabel = {
      text2image: "Text-to-Image",
      bgremove: "Background Removal",
      watermark: "Watermark Removal"
    };

    const intentConfig = {
      tools: {
        label: "Tools",
        pageType: "Vertical Category Hub",
        desc: "Best tools overview for this vertical category.",
        weights: { quality: .22, speed: .16, freeValue: .16, automation: .11, ease: .13, batch: .12, reliability: .10 }
      },
      compare: {
        label: "Compare",
        pageType: "Comparison Page",
        desc: "Head-to-head comparison for two highlighted tools.",
        weights: { quality: .30, speed: .18, freeValue: .10, automation: .12, ease: .09, batch: .10, reliability: .11 }
      },
      usecase: {
        label: "Use-case",
        pageType: "Use-case Landing Page",
        desc: "Scenario-first recommendation for creator workflows.",
        weights: { quality: .18, speed: .20, freeValue: .13, automation: .09, ease: .22, batch: .08, reliability: .10 }
      },
      free: {
        label: "Free-first",
        pageType: "Free-first Collection Page",
        desc: "Prioritizes free value for budget-sensitive selection.",
        weights: { quality: .12, speed: .12, freeValue: .30, automation: .08, ease: .15, batch: .10, reliability: .13 }
      },
      automation: {
        label: "Automation",
        pageType: "Automation-focused Page",
        desc: "Prioritizes API, workflow, and batch automation strength.",
        weights: { quality: .13, speed: .11, freeValue: .06, automation: .27, ease: .10, batch: .20, reliability: .13 }
      }
    };

    const dims = ["quality", "speed", "freeValue", "automation", "ease", "batch", "reliability"];
    const params = new URLSearchParams(window.location.search);
    const intent = params.get("intent") || "tools";
    const category = params.get("category") || "bgremove";
    const kw = params.get("kw") || "";
    const compareA = params.get("a") || "";
    const compareB = params.get("b") || "";
    const config = intentConfig[intent] || intentConfig.tools;
    const rows = (datasets[category] || datasets.bgremove).map(item => {
      const score = dims.reduce((sum, key) => sum + item[key] * config.weights[key], 0);
      return { ...item, score: Number(score.toFixed(2)) };
    }).sort((a, b) => b.score - a.score);

    let finalRows = rows;
    if (intent === "compare" && compareA && compareB) {
      const names = new Set([compareA, compareB]);
      finalRows = rows.filter(row => names.has(row.tool));
      if (!finalRows.length) finalRows = rows.slice(0, 2);
    }

    const title = `${categoryLabel[category] || "Vertical Category"} · ${config.label}`;
    document.getElementById("title").textContent = title;
    document.getElementById("subtitle").textContent = config.desc;

    const meta = document.getElementById("meta");
    [config.pageType, `Category: ${categoryLabel[category] || category}`, kw ? `Keyword: ${kw}` : "Keyword: n/a"].forEach((txt) => {
      const el = document.createElement("span");
      el.className = "pill";
      el.textContent = txt;
      meta.appendChild(el);
    });

    const cards = document.getElementById("cards");
    finalRows.slice(0, 3).forEach((row, idx) => {
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <h3>#${idx + 1} ${row.tool}</h3>
        <p>${row.note}</p>
        <span class="score">Score ${row.score} / 10</span>
        <a class="link" href="${row.url}" target="_blank" rel="noopener noreferrer nofollow">Open Tool</a>
      `;
      cards.appendChild(card);
    });

    const tbody = document.getElementById("tableBody");
    finalRows.forEach((row) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><a class="link" href="${row.url}" target="_blank" rel="noopener noreferrer nofollow">${row.tool}</a></td>
        <td>${row.score}</td>
        <td>${row.quality}</td>
        <td>${row.speed}</td>
        <td>${row.freeValue}</td>
        <td>${row.automation}</td>
        <td>${row.reliability}</td>
      `;
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
